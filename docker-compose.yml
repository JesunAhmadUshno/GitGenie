version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gitgenie_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-gitgenie_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gitgenie_password}
      POSTGRES_DB: ${DB_NAME:-gitgenie_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gitgenie_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gitgenie_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gitgenie_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gitgenie_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: gitgenie_adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DESIGN: "dracula"
    networks:
      - gitgenie_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  gitgenie_network:
    driver: bridge

name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}
      backend-tag: ${{ steps.meta-backend.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        region: [us-east-1, us-west-2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set cluster context
        run: |
          kubectl config use-context ${{ secrets.KUBE_CLUSTER_CONTEXT }}

      - name: Create namespace if not exists
        run: |
          kubectl create namespace gitgenie --dry-run=client -o yaml | kubectl apply -f -

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --docker-email=${{ github.actor }}@users.noreply.github.com \
            -n gitgenie \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image tags in manifests
        run: |
          FRONTEND_TAG=$(echo "${{ needs.build-and-push.outputs.frontend-tag }}" | head -1)
          BACKEND_TAG=$(echo "${{ needs.build-and-push.outputs.backend-tag }}" | head -1)
          
          sed -i "s|ghcr.io/yourusername/gitgenie-frontend:latest|$FRONTEND_TAG|g" k8s/frontend-deployment.yaml
          sed -i "s|ghcr.io/yourusername/gitgenie-backend:latest|$BACKEND_TAG|g" k8s/backend-deployment.yaml

      - name: Deploy to Kubernetes
        run: |
          # Apply manifests
          kubectl apply -f k8s/namespace-and-config.yaml
          kubectl apply -f k8s/rbac.yaml
          kubectl apply -f k8s/postgres-statefulset.yaml
          kubectl apply -f k8s/redis-statefulset.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/backend -n gitgenie --timeout=5m
          kubectl rollout status deployment/frontend -n gitgenie --timeout=5m

      - name: Verify deployment
        run: |
          echo "Checking deployment status..."
          kubectl get deployment -n gitgenie
          kubectl get pods -n gitgenie
          kubectl get svc -n gitgenie
          kubectl get ingress -n gitgenie

      - name: Run smoke tests
        run: |
          # Wait for services to be ready
          kubectl wait --for=condition=ready pod -l app=backend -n gitgenie --timeout=300s || true
          
          # Port forward and test
          kubectl port-forward -n gitgenie svc/backend-service 3001:3001 &
          sleep 10
          
          curl -f http://localhost:3001/health || exit 1
          echo "Backend health check passed!"

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Kubernetes deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
          custom_payload: |
            {
              text: `Deployment to Kubernetes: ${{ job.status }}`,
              attachments: [{
                color: '${{ job.status }}' === 'success' ? 'good' : 'danger',
                text: `Repository: ${process.env.AS_REPO}\nCommit: ${process.env.AS_COMMIT}\nAuthor: ${process.env.AS_AUTHOR}\nMessage: ${process.env.AS_MESSAGE}`
              }]
            }

  rollback:
    if: failure()
    needs: [build-and-push, deploy]
    runs-on: ubuntu-latest

    steps:
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Rollback deployment
        run: |
          kubectl config use-context ${{ secrets.KUBE_CLUSTER_CONTEXT }}
          kubectl rollout undo deployment/backend -n gitgenie
          kubectl rollout undo deployment/frontend -n gitgenie
          echo "Rollback completed"

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: 'failure'
          text: 'Kubernetes deployment rollback completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
